<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Support | GoalForge</title>
    <style>
        :root { --bg: #0f1115; --accent: #3b82f6; --glass: rgba(255, 255, 255, 0.03); --text: #e2e8f0; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; padding: calc(env(safe-area-inset-top) + 60px) 20px 40px; box-sizing: border-box; }
        .nav { display: flex; justify-content: space-around; background: var(--glass); backdrop-filter: blur(20px); padding: 12px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .nav a { text-decoration: none; color: #94a3b8; font-size: 13px; font-weight: 600; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px; text-align: center; backdrop-filter: blur(30px); }
        h1 { color: var(--accent); }
        .email-link { color: #fff; font-size: 18px; font-weight: bold; text-decoration: none; border-bottom: 2px solid var(--accent); padding-bottom: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="index.html">Profile</a>
            <a href="marketing.html">Mission</a>
            <a href="privacy.html">Privacy</a>
            <a href="support.html" style="color: var(--accent);">Contact</a>
        </div>

        <div class="card">
            <h1>Need Support?</h1>
            <p style="color: #94a3b8; margin-bottom: 30px;">I am here to help. Whether you have a question or feedback about GoalForge, feel free to reach out.</p>
            <a href="mailto:davewklr2@gmail.com" class="email-link">davewklr2@gmail.com</a>
            <p style="color: #94a3b8; font-size: 12px; margin-top: 30px; opacity: 0.6;">I aim to respond within 24-48 hours.</p>
        </div>
    </div>
</body>
</html>
